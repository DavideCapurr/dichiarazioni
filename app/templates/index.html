<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dichiarazioni di Conformit&agrave;</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Dichiarazioni di Conformit&agrave;</h1>
            <p class="subtitle">Cerca un cliente e genera la dichiarazione compilata</p>
        </header>

        <section class="search-section">
            <div class="search-box">
                <input
                    type="text"
                    id="searchInput"
                    placeholder="Cerca per ragione sociale o P.IVA..."
                    autocomplete="off"
                >
                <button id="searchBtn" type="button">Cerca</button>
            </div>
        </section>

        <div id="notification" class="notification hidden"></div>

        <section id="resultsSection" class="results-section hidden">
            <h2>Risultati</h2>
            <table id="resultsTable">
                <thead>
                    <tr>
                        <th>Ragione Sociale</th>
                        <th>P.IVA</th>
                        <th>Codice Fiscale</th>
                        <th>Citt&agrave;</th>
                        <th>Azione</th>
                    </tr>
                </thead>
                <tbody id="resultsBody">
                </tbody>
            </table>
        </section>

        <div id="generateModal" class="modal hidden">
            <div class="modal-content">
                <button class="modal-close" id="modalClose">&times;</button>
                <h2>Genera Dichiarazione</h2>
                <div id="clientSummary" class="client-summary"></div>
                <form id="generateForm">
                    <input type="hidden" id="clientId" name="client_id">
                    <div class="form-group">
                        <label for="declarationDate">Data Dichiarazione</label>
                        <input type="date" id="declarationDate" name="declaration_date">
                    </div>
                    <div class="form-group">
                        <label for="declarationNumber">Numero Dichiarazione</label>
                        <input type="text" id="declarationNumber" name="declaration_number" placeholder="Es. 001/2026">
                    </div>
                    <div class="form-group">
                        <label for="notes">Note</label>
                        <textarea id="notes" name="notes" rows="3" placeholder="Note aggiuntive (opzionale)"></textarea>
                    </div>
                    <button type="submit" class="btn-generate">Genera PDF</button>
                </form>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
