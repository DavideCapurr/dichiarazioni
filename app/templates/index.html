<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dichiarazioni di Conformit&agrave; - ITB Impianti Idraulici</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Dichiarazioni di Conformit&agrave;</h1>
            <p class="subtitle">ITB Impianti Idraulici &mdash; Cerca un cliente e genera la dichiarazione</p>
        </header>

        <section class="search-section">
            <div class="search-box">
                <input type="text" id="searchInput"
                       placeholder="Cerca per ragione sociale o P.IVA..."
                       autocomplete="off">
                <button id="searchBtn" type="button">Cerca</button>
            </div>
        </section>

        <div id="notification" class="notification hidden"></div>

        <section id="resultsSection" class="results-section hidden">
            <h2>Risultati</h2>
            <table id="resultsTable">
                <thead>
                    <tr>
                        <th>Ragione Sociale</th>
                        <th>P.IVA</th>
                        <th>Codice Fiscale</th>
                        <th>Citt&agrave;</th>
                        <th>Azione</th>
                    </tr>
                </thead>
                <tbody id="resultsBody"></tbody>
            </table>
        </section>

        <div id="generateModal" class="modal hidden">
            <div class="modal-content">
                <button class="modal-close" id="modalClose">&times;</button>
                <h2>Genera Dichiarazione</h2>
                <div id="clientSummary" class="client-summary"></div>

                <form id="generateForm">
                    <input type="hidden" id="clientId" name="client_id">

                    <div class="form-group">
                        <label for="declarationDate">Data Dichiarazione</label>
                        <input type="date" id="declarationDate" name="declaration_date">
                    </div>

                    <div class="form-group">
                        <label for="tipoImpianto">Tipo di impianto <span class="required">*</span></label>
                        <input type="text" id="tipoImpianto" name="tipo_impianto"
                               placeholder="Es. nuovo impianto idraulico"
                               value="nuovo impianto idraulico" required>
                    </div>

                    <div class="form-group">
                        <label for="descrizioneImpianto">Descrizione impianto <small>("Inteso come")</small></label>
                        <textarea id="descrizioneImpianto" name="descrizione_impianto" rows="2"
                                  placeholder="Es. nuovo impianto idrico sanitario, riscaldamento..."></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="comuneInstallazione">Comune di installazione</label>
                            <input type="text" id="comuneInstallazione" name="comune_installazione"
                                   placeholder="Precompilato dal cliente">
                        </div>
                        <div class="form-group">
                            <label for="viaInstallazione">Via di installazione</label>
                            <input type="text" id="viaInstallazione" name="via_installazione"
                                   placeholder="Precompilato dal cliente">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="proprietario">Proprietario dell'immobile</label>
                            <input type="text" id="proprietario" name="proprietario"
                                   placeholder="Auto-compilato dal cliente">
                        </div>
                        <div class="form-group">
                            <label for="usoEdificio">Uso dell'edificio</label>
                            <select id="usoEdificio" name="uso_edificio">
                                <option value="civile" selected>Civile</option>
                                <option value="commerciale">Commerciale</option>
                                <option value="commerciale">Industriale</option>
                            </select>
                        </div>
                    </div>

                    <!-- 3 voci DICHIARA: sempre selezionate -->
                    <fieldset class="allegati-group allegati-optional">
                        <legend>Il dichiarante attesta di aver</legend>
                        <label class="checkbox">
                            <input type="checkbox" name="dichiara_norma" checked disabled>
                            seguito la norma tecnica applicabile all'impiego UNI7129/2015
                        </label>
                        <label class="checkbox">
                            <input type="checkbox" name="dichiara_componenti" checked disabled>
                            installato componenti e materiali adatti al luogo di installazione (art. 5 e 6)
                        </label>
                        <label class="checkbox">
                            <input type="checkbox" name="dichiara_controllo" checked disabled>
                            controllato l'impianto ai fini della sicurezza e della funzionalit&agrave; con esito positivo
                        </label>
                    </fieldset>

                    <!-- 6 Allegati obbligatori: selezionati dall'utente -->
                    <fieldset class="allegati-group allegati-required">
                        <legend>Allegati obbligatori</legend>
                        <label class="checkbox">
                            <input type="checkbox" name="allegato_progetto">
                            progetto ai sensi degli articoli 5 e 7
                        </label>
                        <label class="checkbox">
                            <input type="checkbox" name="allegato_relazione">
                            relazione con tipologie dei materiali utilizzati
                        </label>
                        <label class="checkbox">
                            <input type="checkbox" name="allegato_schema">
                            schema di impianto realizzato
                        </label>
                        <label class="checkbox">
                            <input type="checkbox" name="allegato_precedenti">
                            riferimento a dichiarazione di conformit&agrave; precedenti o parziali
                        </label>
                        <label class="checkbox">
                            <input type="checkbox" name="allegato_certificato">
                            copia del certificato di riconoscimento dei requisiti tecnico-professionali
                        </label>
                        <label class="checkbox">
                            <input type="checkbox" name="allegato_conformita">
                            attestazione di conformit&agrave; per impianto realizzato con materiali o sistemi non normalizzati
                        </label>
                    </fieldset>

                    <button type="submit" class="btn-generate">Genera PDF</button>
                </form>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
